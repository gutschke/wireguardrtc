<?xml version="1.0" encoding="UTF-8"?>
<!--
  Play Store feature graphic for WireGuardRTC.
  Required dimensions: 1024 x 500 px.

  Visual language mirrors the in-app BrandMark / launcher icon —
  pointy-top hexagon outline + concentric ring glyph, on the
  brand teal palette.  Title + tagline on the right.

  Convert to PNG with:
    convert -density 192 feature-graphic.svg \
      -resize 1024x500 -background '#003737' -flatten \
      feature-graphic.png
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="500"
     viewBox="0 0 1024 500">

  <!-- Background: BrandTeal800 to BrandTeal900 vertical gradient.
       Subtle enough that the launcher-icon's flat teal still feels
       related, but rich enough to read as "feature graphic" not
       "screenshot". -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#003737"/>
      <stop offset="100%" stop-color="#002020"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A7FFFB"/>
      <stop offset="100%" stop-color="#4CDADA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Brand mark: pointy-top hexagon outline + inner open ring.
       Centred at (250, 250); outer radius 150 (~10× the launcher
       icon scale).  Same geometry as ic_launcher_foreground.xml. -->
  <g stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- Pointy-top hexagon: top vertex up, flat sides left/right. -->
    <path d="M 250 100 L 380 175 L 380 325 L 250 400 L 120 325 L 120 175 Z"
          stroke="url(#hex)" stroke-width="14"/>
    <!-- Inner ring, radius 60 around the hexagon centre. -->
    <circle cx="250" cy="250" r="60"
            stroke="#A7FFFB" stroke-width="10"/>
  </g>

  <!-- Title.  Keep enough horizontal space on the right that the
       1024x500 graphic still works when Play crops it to ~16:9. -->
  <text x="460" y="225"
        font-family="DejaVu Sans, Liberation Sans, Helvetica, Arial, sans-serif"
        font-size="78" font-weight="700"
        fill="#FFFFFF"
        letter-spacing="-1">
    WireGuardRTC
  </text>

  <!-- Tagline below the title. -->
  <text x="460" y="285"
        font-family="DejaVu Sans, Liberation Sans, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="400"
        fill="#A7FFFB"
        letter-spacing="0">
    Peer-to-peer WireGuard tunnels.
  </text>
  <text x="460" y="325"
        font-family="DejaVu Sans, Liberation Sans, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="400"
        fill="#A7FFFB"
        letter-spacing="0">
    Self-hosted. NAT-traversing.
  </text>
</svg>
