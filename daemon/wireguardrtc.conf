[Global]
# Generate with: head -c 32 /dev/urandom | base64
# Both endpoints of any tunnel managed by the daemon must share the same Salt.
Salt = CHANGE_ME_TO_A_SECURE_RANDOM_STRING

# Signaling server (PeerJS).  REQUIRED — daemon refuses to start until
# you uncomment exactly one of the two options below.  This is
# deliberate: the broker is a third party in the signalling path, and
# the project doesn't want you to default to the public broker without
# considering the trade-off (rate limits, no service-level agreement).
#
# The broker only ever sees routing IDs (SHA-256 hashes of pubkeys
# salted with [Global] Salt) and AEAD ciphertext; it cannot read the
# endpoint addresses being exchanged.
#
# ── Option A: public broker (0.peerjs.com, hosted by PeerJS) ─────────
# Fine for testing, small home deployments, and one-off pairings.
# Rate-limited; not suitable for production.  Uncomment both lines:
# PeerJsServer = wss://0.peerjs.com/peerjs
# PeerJsKey    = peerjs
#
# ── Option B: self-hosted broker (recommended for production) ──────
# Run your own with one Docker container — see wireguardrtc(8) §SELF-
# HOSTING:
#   docker run -d --name peerjs-broker --restart=always \
#       -p 9000:9000 peerjs/peerjs-server --port 9000 --key MY_KEY
# Then set:
# PeerJsServer = ws://your-broker.example.com:9000/peerjs
# PeerJsKey    = MY_KEY

# Optional: override STUN-based public-IP discovery with a static address.
# Set this if the host has a known stable public IPv4 (VPS, dedicated IP)
# or if outbound STUN is blocked by your firewall.  When set, the daemon
# never queries STUN.  IPv4 only — IPv6 endpoint publication is not yet
# implemented.
# PublicIp = 203.0.113.5

[Stun]
# Comma-separated list. Daemon resolves each address fresh per query.
# Ignored when PublicIp is set in [Global].
Servers = stun.l.google.com:19302, stun.cloudflare.com:3478, stun.nextcloud.com:3478

# Strict = yes rejects STUN responses whose XOR-MAPPED-ADDRESS is not
# globally routable (RFC 1918 private, CGN 100.64/10, loopback,
# link-local, RFC 5737 documentation, etc.) — useful when you know
# the host has a real public IPv4 and a hijacked / misconfigured STUN
# server would otherwise feed you an internal address that you'd then
# advertise to peers.  Default is no because LAN-only deployments
# legitimately advertise private addresses.
# Strict = yes

# ─── auto-enrollment ───────────────────────────────────────────────────────
# Auto-enrollment lets new peers join the mesh via either a one-time
# QR-encoded token (`wireguardrtc --enroll-token NAME`) or a 6-letter
# wormhole code (`wireguardrtc --mint-wormhole`).  Both paths verify a
# short authentication string (SAS) or signed token before committing
# the peer.  See wireguardrtc(8) §AUTO-ENROLLMENT for the wire format
# and threat model.
#
# Privilege model: this daemon runs sandboxed (no /etc/wireguard
# write, NoNewPrivileges, …) and CANNOT add peers to the kernel WG
# interface or to the on-disk WG config by itself.  Instead, it talks
# to a small privileged broker over a Unix socket
# (wireguardrtc-provision-broker.socket /
# wireguardrtc-provision-broker@.service); the broker validates the
# request and invokes the actual Provisioner with root.
# ProvisionScript here ALWAYS points at the daemon-side client; the
# upstream Provisioner is configured separately in
# /etc/wireguardrtc/provision-broker.conf (defaults to
# /usr/sbin/wireguardrtc-provision-default, which allocates from
# a CIDR Pool in /etc/wireguardrtc/provisioning.conf).
#
# Customising:
#   - To replace the bundled Provisioner with your own helper (e.g.
#     /etc/wireguard/provision-rtc that integrates with an existing
#     peers-file / config-peers workflow), edit
#     /etc/wireguardrtc/provision-broker.conf and set:
#         Provisioner = /path/to/your-helper
#     See /usr/share/doc/wireguardrtc/examples/provision-broker.conf
#     for reference, and docs/provision-scripts.md for the contract.
#   - To disable auto-enrollment entirely, set "Enabled = no" below
#     (or delete the section).
#   - To make a new peer's drop-in default to Mode=passive (no
#     outbound OFFERs from this host) flip AutoActive = no.

[Enrollment]
Enabled = yes
ProvisionScript = /usr/sbin/wireguardrtc-provision-client
StateDir = /var/lib/wireguardrtc
MaxPendingTokens = 32

# AutoActive (default yes): when a peer successfully enrolls, write a
# peers.d-style drop-in to <StateDir>/auto-enrolled.d/ with Mode=active
# so the daemon pushes signalling OFFERs to the new peer without
# requiring you to hand-author a peers.d/<label>.conf.  An explicit
# drop-in in /etc/wireguardrtc/peers.d/ with the same PublicKey always
# overrides this auto-active entry.
AutoActive = yes

# Per-peer configuration lives in /etc/wireguardrtc/peers.d/<label>.conf.
# Filename is a human-friendly label; the actual public key goes inside.
# Peers without a drop-in file are ignored by the daemon.
