[Global]
# Generate with: head -c 32 /dev/urandom | base64
# Both endpoints of any tunnel managed by the daemon must share the same Salt.
Salt = CHANGE_ME_TO_A_SECURE_RANDOM_STRING

# Signaling server (PeerJS).
#
# Self-hosting is strongly recommended for anything beyond ad-hoc testing.
# The broker sees only routing IDs (SHA-256 hashes) and ciphertext — it
# cannot read endpoint addresses — but self-hosting avoids rate limits and
# connection caps on shared infrastructure.
#
# Self-host with Docker:
#   docker run -d --name peerjs-broker --restart=always \
#       -p 9000:9000 peerjs/peerjs-server --port 9000 --key YOUR_SECRET_KEY
#
# Then set:
#   PeerJsServer = ws://your.broker.example:9000/peerjs
#   PeerJsKey    = YOUR_SECRET_KEY
#
PeerJsServer = ws://your.broker.example:9000/peerjs
PeerJsKey = YOUR_SECRET_KEY

# The public broker at 0.peerjs.com works for testing or very small setups
# but has rate limits and is not suitable for production. Uncomment to use:
# PeerJsServer = wss://0.peerjs.com/peerjs
# PeerJsKey    = peerjs

# Optional: override STUN-based public-IP discovery with a static address.
# Set this if the host has a known stable public IPv4 (VPS, dedicated IP)
# or if outbound STUN is blocked by your firewall.  When set, the daemon
# never queries STUN.  IPv4 only — IPv6 endpoint publication is not yet
# implemented.
# PublicIp = 203.0.113.5

[Stun]
# Comma-separated list. Daemon resolves each address fresh per query.
# Ignored when PublicIp is set in [Global].
Servers = stun.l.google.com:19302, stun.cloudflare.com:3478, stun.nextcloud.com:3478

# Strict = yes rejects STUN responses whose XOR-MAPPED-ADDRESS is not
# globally routable (RFC 1918 private, CGN 100.64/10, loopback,
# link-local, RFC 5737 documentation, etc.) — useful when you know
# the host has a real public IPv4 and a hijacked / misconfigured STUN
# server would otherwise feed you an internal address that you'd then
# advertise to peers.  Default is no because LAN-only deployments
# legitimately advertise private addresses.
# Strict = yes

# ─── auto-enrollment (optional) ─────────────────────────────────────────────
# Auto-enrollment lets new peers join the mesh by scanning a one-time QR code
# (minted with `wireguardrtc --enroll-token NAME`).  See man page section
# AUTO-ENROLLMENT for the protocol and threat model.
#
# Privilege model: this daemon runs sandboxed (no /etc/wireguard write,
# NoNewPrivileges, etc.) and CANNOT add peers to the kernel WireGuard
# interface or to the on-disk WG config by itself.  Instead, it talks
# to a small privileged broker (wireguardrtc-provision-broker.socket /
# wireguardrtc-provision-broker@.service) over a Unix socket; the
# broker validates the request and invokes the actual Provisioner with
# root privileges.  ProvisionScript here ALWAYS points at the daemon-
# side client; configure the upstream Provisioner separately in
# /etc/wireguardrtc/provision-broker.conf.
#
# To enable:
#  1. Pick the Provisioner that suits your deployment.  Two options:
#       (a) /usr/sbin/wireguardrtc-provision-default — stock wg-quick;
#           allocates from a CIDR pool in /etc/wireguardrtc/provisioning.conf,
#           appends [Peer] blocks to /etc/wireguard/<iface>.conf.
#       (b) Your own helper (e.g. /etc/wireguard/provision-rtc) — see
#           /usr/share/doc/wireguardrtc/examples/ for reference scripts.
#     Set it in /etc/wireguardrtc/provision-broker.conf via:
#         Provisioner = /path/to/your-helper
#  2. Enable the broker (socket activation, started on first request):
#         sudo systemctl enable --now wireguardrtc-provision-broker.socket
#  3. Uncomment and enable below.
#  4. Restart the daemon: sudo systemctl restart wireguardrtc
#  5. Mint a token: sudo wireguardrtc --enroll-token NAME
#
# [Enrollment]
# Enabled = yes
# ProvisionScript = /usr/sbin/wireguardrtc-provision-client
# StateDir = /var/lib/wireguardrtc
# MaxPendingTokens = 32
#
# AutoActive (default yes): when a peer successfully enrols, write a
# peers.d-style drop-in to <StateDir>/auto-enrolled.d/ with Mode=active
# so the daemon pushes signalling OFFERs to the new peer without
# requiring you to hand-author a peers.d/<label>.conf.  This is what
# lets the Android client (Phase-2 long-lived listener) follow the
# server's STUN-discovered IP as it roams.  An explicit drop-in in
# /etc/wireguardrtc/peers.d/ with the same PublicKey always overrides
# the auto-active entry, so you can downgrade to passive (or ignore)
# any specific peer without affecting the rest.  Set "AutoActive = no"
# to require explicit per-peer admin opt-in for OFFER push.
# AutoActive = yes

# Per-peer configuration lives in /etc/wireguardrtc/peers.d/<label>.conf.
# Filename is a human-friendly label; the actual public key goes inside.
# Peers without a drop-in file are ignored by the daemon.
