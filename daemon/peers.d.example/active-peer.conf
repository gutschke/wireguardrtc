# Example: a peer behind a cone NAT that we want to keep reachable.
# Copy to /etc/wireguardrtc/peers.d/<label>.conf, set PublicKey to the peer's
# WireGuard public key, and (optionally) rename the file to something
# memorable like `laptop-anna.conf` or `home-server.conf`.

[Peer]
PublicKey = REPLACE_WITH_BASE64_PUBLIC_KEY_OF_PEER
Mode = active

# Mode reference:
#
#   active     — proactively signal via the broker, raw-inject, and wake when
#                the tunnel is dead. Use for peers expected to be online and
#                reachable by this host (server↔server, fixed peers).
#
#   passive    — never initiate outbound; accept incoming OFFERs if the
#                peer dials in. Use for mobile devices and dormant clients
#                that may be offline most of the time.
#
#   dns-roam   — endpoint is refreshed from a DNS hostname; broker not used.
#                Add a `DnsHost = home.example.com:51820` line. Useful for
#                peers behind dynamic DNS where you already know the hostname.
#
#   ignore     — daemon does nothing for this peer. Useful for upstream
#                client tunnels (your VPN provider) where the endpoint is
#                static and managed externally.
